services:
  postgres:
    image: postgres:16-alpine
    container_name: stickerlab-db
    environment:
      POSTGRES_USER: stickerlab
      POSTGRES_PASSWORD: stickerlabpass
      POSTGRES_DB: stickerlabdb
    ports:
      - "5432:5432"
    volumes:
      - stickerlab_pgdata:/var/lib/postgresql/data

volumes:
  stickerlab_pgdata:
